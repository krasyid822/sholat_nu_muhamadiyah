<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Waqt Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Import Adhan locally (cached by Service Worker) -->
  <script src="adhan.umd.min.js"></script>
  <style>
    :root {
      --gold: #D4AF37;
      --bg-gradient: linear-gradient(135deg, rgba(12, 25, 19, 0.95) 0%, rgba(5, 18, 12, 0.98) 100%);
      --border-color: rgba(212, 175, 55, 0.25);
    }

    html {
      background-color: transparent;
    }

    body {
      background-color: transparent;
      color: #FFFFFF;
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .widget-container {
      width: 100%;
      height: 100%;
      background: var(--bg-gradient);
      border: none;
      border-radius: 0;
      padding: clamp(6px, 2.5vmin, 20px) clamp(8px, 3vmin, 24px);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: clamp(4px, 1.5vmin, 14px);
      backdrop-filter: blur(10px);
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      padding-bottom: clamp(3px, 1vmin, 10px);
      width: 100%;
      flex-shrink: 0;
      min-width: 0;
      gap: 6px;
      overflow: hidden;
    }

    .location-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex-shrink: 1;
      overflow: hidden;
    }

    .title {
      color: var(--gold);
      /* vmin = min(vw, vh) — scales with the narrower dimension, safe on both landscape and portrait */
      font-size: clamp(11px, 5.5vmin, 30px);
      font-weight: 800;
      letter-spacing: 2px;
      margin: 0;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .city {
      font-size: clamp(8px, 3.2vmin, 17px);
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: color 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .city:hover {
      color: var(--gold);
    }

    .time-info {
      text-align: right;
      flex-shrink: 0;
    }

    .clock {
      font-size: clamp(13px, 6vmin, 38px);
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .countdown {
      font-size: clamp(7px, 3vmin, 16px);
      color: #81C784;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── PRAYERS GRID ───────────────────────────────────────── */
    /* Default: landscape → 6 columns × 1 row */
    .prayers-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: clamp(3px, 1.2vmin, 10px);
      width: 100%;
      flex: 1;
      min-height: 0;
      align-content: stretch;
    }

    /* Mendekati square (4:3 ke bawah) → 3 kolom × 2 baris */
    @media (max-aspect-ratio: 4/3) {
      .prayers-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Portrait (lebih tinggi dari lebar) → 2 kolom × 3 baris */
    @media (max-aspect-ratio: 1/1) {
      .prayers-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Tinggi (tinggi ≥ 2× lebar) → 1 kolom × 6 baris — maksimal row */
    @media (max-aspect-ratio: 1/2) {
      .prayers-grid {
        grid-template-columns: repeat(1, 1fr);
      }
    }

    .prayer-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 0;
      padding: clamp(4px, 1.5vmin, 18px) 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(3px, 0.8vmin, 10px);
      transition: all 0.3s ease;
      min-width: 0;
      overflow: hidden;
    }

    .prayer-card.active {
      background: rgba(212, 175, 55, 0.08);
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 0 8px rgba(212, 175, 55, 0.15);
    }

    .prayer-name {
      font-size: clamp(7px, 3vmin, 18px);
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      text-align: center;
    }

    .prayer-card.active .prayer-name {
      color: var(--gold);
    }

    .prayer-time {
      font-size: clamp(9px, 4.5vmin, 28px);
      font-weight: 600;
      color: #FFFFFF;
      white-space: nowrap;
    }

    .prayer-card.active .prayer-time {
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .footer-note {
      font-size: clamp(6px, 2vmin, 13px);
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      margin: 0;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Very short horizontal widget (e.g. 4×1) ─────────── */
    @media (max-height: 115px) {
      .widget-container {
        flex-direction: row;
        align-items: center;
        padding: 4px 8px;
        gap: 8px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        border-bottom: none;
        border-right: 1px solid rgba(212, 175, 55, 0.15);
        padding-bottom: 0;
        padding-right: 8px;
        gap: 1px;
        width: auto;
        height: 100%;
        flex-shrink: 0;
      }

      .time-info {
        text-align: left;
      }

      .prayers-grid {
        flex-grow: 1;
        gap: 3px;
        height: 100%;
        align-content: center;
        /* Force 6 columns regardless of aspect ratio on short bar */
        grid-template-columns: repeat(6, 1fr) !important;
      }

      .prayer-card {
        padding: 2px;
        height: 100%;
        justify-content: center;
      }

      .footer-note {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="widget-container">
    <div class="header">
      <div class="location-info">
        <h1 class="title">AL-WAQT</h1>
        <div id="city-name" class="city">Loading...</div>
      </div>
      <div class="time-info">
        <div id="clock" class="clock">00:00:00</div>
        <div id="countdown" class="countdown">-00:00:00</div>
      </div>
    </div>

    <div class="prayers-grid">
      <div id="card-Subuh" class="prayer-card">
        <span class="prayer-name">SUBUH</span>
        <span id="time-Subuh" class="prayer-time">--:--</span>
      </div>
      <div id="card-Syuruq" class="prayer-card">
        <span class="prayer-name">SYURUQ</span>
        <span id="time-Syuruq" class="prayer-time">--:--</span>
      </div>
      <div id="card-Dzuhur" class="prayer-card">
        <span class="prayer-name">DZUHUR</span>
        <span id="time-Dzuhur" class="prayer-time">--:--</span>
      </div>
      <div id="card-Ashar" class="prayer-card">
        <span class="prayer-name">ASHAR</span>
        <span id="time-Ashar" class="prayer-time">--:--</span>
      </div>
      <div id="card-Maghrib" class="prayer-card">
        <span class="prayer-name">MAGHRIB</span>
        <span id="time-Maghrib" class="prayer-time">--:--</span>
      </div>
      <div id="card-Isya" class="prayer-card">
        <span class="prayer-name">ISYA</span>
        <span id="time-Isya" class="prayer-time">--:--</span>
      </div>
    </div>

    <p id="method-note" class="footer-note">Metode Hisab: Kemenag RI</p>
  </div>

  <script>
    // Shared Preferences Decoder
    function getPref(key, defaultValue) {
      let val = localStorage.getItem('flutter.' + key);
      if (!val) return defaultValue;
      if (val.startsWith('"') && val.endsWith('"')) {
        val = val.substring(1, val.length - 1);
      }
      const prefix = 'VGhpcyBpcyB0aGUgcHJlZml4Lg';
      if (val.startsWith(prefix)) {
        val = val.substring(prefix.length);
      }
      if (val === 'true') return true;
      if (val === 'false') return false;
      const num = Number(val);
      if (!isNaN(num)) return num;
      return val;
    }

    let calculatedTimes = {};
    let nextPrayerName = "";
    let nextPrayerTime = null;

    function formatTime(date) {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function calculatePrayerTimes() {
      if (!window.adhan) {
        console.log('Adhan library not loaded yet. Waiting...');
        return;
      }
      const now = new Date();

      // Load configuration from local storage
      const locationMode = getPref('location_mode', 2); // 0: preset, 1: custom, 2: gps
      const calcMethod = getPref('calc_method', 0); // 0: kemenag, 1: muhammadiyah
      const useIhtiyati = getPref('use_ihtiyati', true);
      const selectedCity = getPref('selected_city', 'Jakarta');

      let latitude = -6.2088;
      let longitude = 106.8456;
      let displayName = selectedCity;

      if (locationMode === 2) {
        // GPS
        const gpsLat = getPref('gps_lat', null);
        const gpsLng = getPref('gps_lng', null);
        const gpsLocName = getPref('gps_loc_name', 'Lokasi GPS');

        // Auto-request location on load to keep it fresh
        if (!window.hasRequestedLocationAuto) {
          window.hasRequestedLocationAuto = true;
          requestDeviceLocation();
        }

        if (gpsLat !== null && gpsLng !== null) {
          latitude = gpsLat;
          longitude = gpsLng;
          displayName = gpsLocName ? gpsLocName.split(',')[0] : selectedCity;
        } else {
          displayName = selectedCity;
        }
      } else if (locationMode === 1) {
        // Custom coords
        const customLat = getPref('custom_lat', null);
        const customLng = getPref('custom_lng', null);
        if (customLat !== null && customLng !== null) {
          latitude = customLat;
          longitude = customLng;
          displayName = "Kustom";
        }
      }

      document.getElementById('city-name').innerText = displayName;

      // Set calculation parameters
      let params;
      let methodLabel = "Kemenag RI";
      if (calcMethod === 1) {
        // Muhammadiyah
        params = adhan.CalculationMethod.MuslimWorldLeague();
        params.fajrAngle = 18.0;
        params.ishaAngle = 18.0;
        methodLabel = "Muhammadiyah";
      } else {
        // Kemenag
        params = adhan.CalculationMethod.Singapore();
        methodLabel = "Kemenag (NU)";
      }

      if (useIhtiyati) {
        params.adjustments.fajr = 2;
        params.adjustments.dhuhr = 2;
        params.adjustments.asr = 2;
        params.adjustments.maghrib = 2;
        params.adjustments.isha = 2;
        methodLabel += " (+2m Ihtiyati)";
      }

      document.getElementById('method-note').innerText = "Metode: " + methodLabel;

      const coordinates = new adhan.Coordinates(latitude, longitude);
      const adhanTimes = new adhan.PrayerTimes(coordinates, now, params);

      calculatedTimes = {
        'Subuh': adhanTimes.fajr,
        'Syuruq': adhanTimes.sunrise,
        'Dzuhur': adhanTimes.dhuhr,
        'Ashar': adhanTimes.asr,
        'Maghrib': adhanTimes.maghrib,
        'Isya': adhanTimes.isha
      };

      // Update UI times
      for (const [name, time] of Object.entries(calculatedTimes)) {
        document.getElementById(`time-${name}`).innerText = formatTime(time);
      }
    }

    function updateWidget() {
      const now = new Date();

      // Update clock
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').innerText = `${h}:${m}:${s}`;

      // Recalculate once a day, or if empty
      if (Object.keys(calculatedTimes).length === 0 || now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
        calculatePrayerTimes();
      }

      // If adhan is not loaded yet, don't run next-prayer logic
      if (!window.adhan || Object.keys(calculatedTimes).length === 0) {
        return;
      }

      // Find next prayer
      nextPrayerName = "";
      nextPrayerTime = null;
      let activePrayerName = "";

      const prayerOrder = ['Subuh', 'Syuruq', 'Dzuhur', 'Ashar', 'Maghrib', 'Isya'];

      for (let i = 0; i < prayerOrder.length; i++) {
        const name = prayerOrder[i];
        const time = calculatedTimes[name];
        if (time && time > now) {
          nextPrayerName = name;
          nextPrayerTime = time;
          if (i > 0) {
            activePrayerName = prayerOrder[i - 1];
          } else {
            activePrayerName = 'Isya'; // Default if before subuh
          }
          break;
        }
      }

      // If all prayers today have passed, next is Subuh tomorrow
      if (!nextPrayerTime) {
        nextPrayerName = "Subuh";
        activePrayerName = "Isya";
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);

        // Calculate subuh for tomorrow
        const locationMode = getPref('location_mode', 2);
        const calcMethod = getPref('calc_method', 0);
        const useIhtiyati = getPref('use_ihtiyati', true);

        let latitude = -6.2088;
        let longitude = 106.8456;
        if (locationMode === 2) {
          const gpsLat = getPref('gps_lat', null);
          const gpsLng = getPref('gps_lng', null);
          if (gpsLat !== null && gpsLng !== null) {
            latitude = gpsLat;
            longitude = gpsLng;
          }
        } else if (locationMode === 1) {
          const customLat = getPref('custom_lat', null);
          const customLng = getPref('custom_lng', null);
          if (customLat !== null && customLng !== null) {
            latitude = customLat;
            longitude = customLng;
          }
        }

        let params = calcMethod === 1 ? adhan.CalculationMethod.MuslimWorldLeague() : adhan.CalculationMethod.Singapore();
        if (calcMethod === 1) {
          params.fajrAngle = 18.0;
          params.ishaAngle = 18.0;
        }
        if (useIhtiyati) {
          params.adjustments.fajr = 2;
        }
        const coordinates = new adhan.Coordinates(latitude, longitude);
        const tomorrowTimes = new adhan.PrayerTimes(coordinates, tomorrow, params);
        nextPrayerTime = tomorrowTimes.fajr;
      }

      // Update active highlight card
      prayerOrder.forEach(name => {
        const card = document.getElementById(`card-${name}`);
        if (name === activePrayerName) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }
      });

      // Update countdown
      const diffMs = nextPrayerTime - now;
      const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
      const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
      const diffSecs = Math.floor((diffMs % (1000 * 60)) / 1000);

      const ch = String(diffHrs).padStart(2, '0');
      const cm = String(diffMins).padStart(2, '0');
      const cs = String(diffSecs).padStart(2, '0');

      document.getElementById('countdown').innerText = `-${ch}:${cm}:${cs} ${nextPrayerName}`;
    }

    // Initial setup
    calculatePrayerTimes();
    updateWidget();

    function requestDeviceLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const prefix = 'VGhpcyBpcyB0aGUgcHJlZml4Lg';
            localStorage.setItem('flutter.gps_lat', prefix + lat);
            localStorage.setItem('flutter.gps_lng', prefix + lng);
            localStorage.setItem('flutter.location_mode', prefix + '2');

            calculatePrayerTimes();
            updateWidget();

            // Reverse geocoding via OpenStreetMap Nominatim
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=12&addressdetails=1`)
              .then(res => res.json())
              .then(data => {
                const addr = data.address || {};
                // Priority: city_district/suburb (for local areas), city, town, municipality, county, state
                const locName = addr.city_district || addr.suburb || addr.city || addr.town || addr.municipality || addr.county || addr.state || 'GPS';
                localStorage.setItem('flutter.gps_loc_name', prefix + locName);
                calculatePrayerTimes();
                updateWidget();
              })
              .catch(err => {
                console.warn('Nominatim reverse geocoding failed:', err);
                if (!localStorage.getItem('flutter.gps_loc_name')) {
                  localStorage.setItem('flutter.gps_loc_name', prefix + 'GPS');
                  calculatePrayerTimes();
                  updateWidget();
                }
              });
          },
          (error) => {
            console.error('Error getting location:', error);
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    }

    // Tick clock & countdown every second
    setInterval(updateWidget, 1000);

    // Bind click listener for manual geolocation request
    document.getElementById('city-name').addEventListener('click', requestDeviceLocation);

    // Refresh configurations when widget is refocused/clicked
    window.addEventListener('focus', () => {
      calculatePrayerTimes();
      updateWidget();
    });
  </script>
</body>

</html>
