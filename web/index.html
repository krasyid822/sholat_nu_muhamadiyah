  <script>
    // JS helpers for PWA offline notifications and wake lock
    window.requestNotificationPermission = async function () {
      if (!('Notification' in window)) {
        console.log('Notification API not supported');
        return 'unsupported';
      }
      return await Notification.requestPermission();
    };

    window.showLocalNotification = function (title, body) {
      if (!('Notification' in window) || Notification.permission !== 'granted') {
        console.warn('[Notification] Cannot show: permission is', Notification.permission);
        return;
      }

      const options = {
        body: body,
        icon: 'icons/Icon-192.png',
        badge: 'icons/Icon-192.png',
        vibrate: [200, 100, 200],
        tag: 'alwaqt-' + Date.now(), // unique tag to avoid duplicate suppression
        requireInteraction: true,
      };

      console.log('[Notification] Attempting to show:', title);

      // Strategy 1: Service Worker registration (preferred on Android Chrome PWA/mobile)
      async function showViaServiceWorker() {
        if (!('serviceWorker' in navigator)) return false;
        try {
          // Check if active registration exists first
          let reg = await navigator.serviceWorker.getRegistration();
          if (reg && reg.active) {
            await reg.showNotification(title, options);
            console.log('[Notification] Shown via active getRegistration()');
            return true;
          }

          // Fall back to ready with a 2-second timeout to prevent infinite hanging
          const readyPromise = navigator.serviceWorker.ready;
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Timeout waiting for Service Worker ready')), 2000)
          );

          reg = await Promise.race([readyPromise, timeoutPromise]);
          if (reg && reg.active) {
            await reg.showNotification(title, options);
            console.log('[Notification] Shown via serviceWorker.ready');
            return true;
          }
        } catch (err) {
          console.warn('[Notification] SW method failed or timed out:', err);
        }
        return false;
      }

      // Strategy 2: Legacy Notification constructor (fallback, works on desktop)
      function showViaLegacy() {
        try {
          new Notification(title, options);
          console.log('[Notification] Shown via legacy constructor');
          return true;
        } catch (e) {
          console.warn('[Notification] Legacy constructor blocked/failed:', e);
          return false;
        }
      }

      // Execute: Try SW first (best for mobile/PWA), fallback to legacy constructor
      showViaServiceWorker().then((swShown) => {
        if (!swShown) {
          showViaLegacy();
        }
      }).catch((err) => {
        console.error('[Notification] Error during SW notification attempt:', err);
        showViaLegacy();
      });
    };

    window.playNotificationSound = function (soundType) {
      try {
        if (soundType === 'adzan') {
          const soundUrl = 'azan.mp3';
          const audio = new Audio(soundUrl);

          audio.play().catch((err) => {
            console.log('Audio autoplay blocked or failed:', err);
          });
        } else {
          // Premium Web Audio API Synthesized chime - 100% reliable, works offline, zero network requests
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            const audioCtx = new AudioContext();

            // First chime tone (high and sweet)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
            gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.2);

            // Second chime tone (warm and resonant, slightly delayed)
            setTimeout(() => {
              const osc2 = audioCtx.createOscillator();
              const gain2 = audioCtx.createGain();
              osc2.type = 'sine';
              osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5 note
              gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
              gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

              osc2.connect(gain2);
              gain2.connect(audioCtx.destination);
              osc2.start();
              osc2.stop(audioCtx.currentTime + 0.3);
            }, 100);

            console.log('[Audio] Played synthetic notification chime');
          } else {
            console.warn('[Audio] Web Audio API not supported');
          }

    // Initialize Firebase in the main thread (compat SDK)
    const firebaseConfig = {

    window.fcmTokenReady = false;

    // Retrieve FCM token using the Firebase compat SDK.
    //
    // IMPORTANT: The post_build.dart tool replaces Flutter's generated
    // flutter_service_worker.js with a proxy that imports firebase-messaging-sw.js
    // via importScripts(). This means the service worker at scope '/' ALREADY
    // includes Firebase messaging's push event handler.
    //
    // Therefore, we do NOT need to register firebase-messaging-sw.js separately.
    // Doing so would replace the proxy SW and break the PWA cache logic.
    //
    // Strategy:
    // 1. Call messaging.getToken({ vapidKey }) WITHOUT serviceWorkerRegistration.
    //    The Firebase compat SDK will use navigator.serviceWorker.ready, which
    //    returns Flutter's proxy SW (flutter_service_worker.js that imports
    //    firebase-messaging-sw.js). This SW already handles push events.
    // 2. If the compat SDK fails, fall back to the Flutter firebase_messaging
    //    plugin's getToken() which uses the same approach.
    window._fcmTokenInvalidated = false;

    window.getFcmTokenWithMainSW = function (vapidKey) {
      window.fcmTokenReady = false;
      window.lastFcmToken = null;
      window.fcmTokenError = null;

      (async () => {
        // If the token was invalidated by a SW change, log it
        if (window._fcmTokenInvalidated) {
          console.log('[FCM] Token was invalidated by SW controller change, requesting fresh token');
          window._fcmTokenInvalidated = false;
        }
        try {
          if (!messaging) {
            throw new Error('Firebase Messaging is not initialized on the main page.');
          }

          // Ensure the service worker registration is fetched before requesting token.
          console.log('[FCM] Fetching service worker registration...');
          let reg = null;
          try {
            reg = await navigator.serviceWorker.getRegistration();
            if (!reg) {
              console.log('[FCM] Active registration not found yet, waiting for serviceWorker.ready...');
              reg = await navigator.serviceWorker.ready;
            }
            console.log('[FCM] Service worker registration:', reg ? 'found' : 'not found');
          } catch (swError) {
            console.warn('[FCM] navigator.serviceWorker.getRegistration failed:', swError);
          }

          console.log('[FCM] Requesting token via compat SDK...');
          let token;
          try {
            token = await messaging.getToken({ 
              vapidKey: vapidKey,
              serviceWorkerRegistration: reg
            });
          } catch (tokenError) {
            const errStr = tokenError.toString();
            if (errStr.includes('VersionError') || tokenError.name === 'VersionError') {
              console.warn('[FCM] IndexedDB VersionError detected. Cleaning databases and retrying...');
              
              const dbsToDelete = ['firebase-messaging-database', 'fcm_token_details_db', 'firebase-installations-database'];
              for (const dbName of dbsToDelete) {
                try {
                  await new Promise((resolve) => {
                    const req = indexedDB.deleteDatabase(dbName);
                    req.onsuccess = () => { console.log('[FCM] Deleted DB:', dbName); resolve(); };
                    req.onerror = () => { console.warn('[FCM] Failed to delete DB:', dbName); resolve(); };
                    req.onblocked = () => { console.warn('[FCM] DB delete blocked:', dbName); resolve(); };
                  });
                } catch (dbErr) {
                  console.warn('[FCM] Error deleting DB:', dbName, dbErr);
                }
              }
              
              token = await messaging.getToken({ 
                vapidKey: vapidKey,
                serviceWorkerRegistration: reg
              });
            } else {
              throw tokenError;
            }
          }

          window.lastFcmToken = token;
          window.fcmTokenReady = true;
          console.log('[FCM] Token obtained successfully via compat SDK');
        } catch (e) {
          console.error('[FCM] Error in getFcmTokenWithMainSW:', e);
          window.fcmTokenError = e.toString();
          window.fcmTokenReady = true;
        }
      })();
    };

    window.registerBackgroundSync = async function () {
      if (!('serviceWorker' in navigator)) return;
      try {
        const reg = await navigator.serviceWorker.ready;
        
        // Register standard Background Sync
        if ('sync' in reg) {
          await reg.sync.register('sync-app-data').catch((e) => {
            console.warn('[Background Sync] Registration failed:', e);
          });
          console.log('[Background Sync] Registered successfully.');
        } else {
          console.log('[Background Sync] Not supported by this browser.');
        }

        // Register Periodic Background Sync
        if ('periodicSync' in reg) {
          const status = await navigator.permissions.query({
            name: 'periodic-background-sync',
          }).catch(() => null);
          
          if (!status || status.state === 'granted') {
            await reg.periodicSync.register('update-app-cache', {
              minInterval: 24 * 60 * 60 * 1000, // 24 hours
            }).catch((e) => {
              console.warn('[Periodic Sync] Registration failed:', e);
            });
            console.log('[Periodic Sync] Registered successfully.');
          } else {
            console.log('[Periodic Sync] Permission state is:', status.state);
          }
        } else {
          console.log('[Periodic Sync] Not supported by this browser.');
        }
      } catch (err) {
        console.warn('[Sync Registration] Failed:', err);
      }
    };

    window.registerFirebaseMessagingSW = async function () {
      if (!('serviceWorker' in navigator)) {
        console.warn('[FCM] Service worker not supported in this browser.');
        return false;
      }
      try {
        let reg = await navigator.serviceWorker.getRegistration();
        if (reg && reg.active) {
          console.log('[FCM] SW already active:', reg.active.scriptURL);
          window.registerBackgroundSync();
          return true;
        }

        // Register the service worker.
        // - Localhost: register firebase-messaging-sw.js directly (no flutter build output)
        // - Production: register flutter_service_worker.js (our 2-line proxy that
        //   imports firebase-messaging-sw.js via importScripts). This is the same
        //   URL Flutter would use, preventing scope/URL conflicts.
        //
        // NOTE: We are now the SOLE registrar of the SW. Flutter's bootstrap has
        // been patched by post_build.dart to remove serviceWorkerSettings, so it
        // no longer registers or updates the SW.
        const isLocalDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const swUrl = isLocalDev ? 'firebase-messaging-sw.js' : 'flutter_service_worker.js';

        console.log('[FCM] No active SW found. Registering:', swUrl);
        reg = await navigator.serviceWorker.register(swUrl);
        console.log('[FCM] SW registered:', reg.scope);
        window.registerBackgroundSync();
        return true;
      } catch (err) {
        console.error('[FCM] SW registration failed:', err);
        return false;
      }
    };

    // Force-refresh the FCM token by deleting the Firebase Messaging IndexedDB

      console.log('[FCM] Force-refreshing FCM token...');

      // 1. Delete Firebase Messaging IndexedDB to invalidate old token
      const dbsToDelete = ['firebase-messaging-database', 'fcm_token_details_db', 'firebase-installations-database'];

        } catch (e) {
          console.warn('[FCM] Error deleting DB:', dbName, e);
        }
      }

      // 2. Clear cached token from SharedPreferences via Dart
      // (handled on the Dart side)

      // 3. Re-fetch token
      window.fcmTokenReady = false;
      window.lastFcmToken = null;
      window.fcmTokenError = null;

      try {
        if (!messaging) {
          throw new Error('Firebase Messaging is not initialized.');
        }
        console.log('[FCM] Fetching service worker registration before force-refresh...');
        const reg = await navigator.serviceWorker.getRegistration();
        console.log('[FCM] Requesting new token after force-refresh...');
        let token;
        try {
          token = await messaging.getToken({ 
            vapidKey: vapidKey,
            serviceWorkerRegistration: reg
          });
        } catch (tokenError) {
          const errStr = tokenError.toString();
          if (errStr.includes('VersionError') || tokenError.name === 'VersionError') {
            console.warn('[FCM] IndexedDB VersionError detected during force-refresh. Cleaning databases and retrying...');
            
            const dbsToDelete2 = ['firebase-messaging-database', 'fcm_token_details_db', 'firebase-installations-database'];
            for (const dbName of dbsToDelete2) {
              try {
                await new Promise((resolve) => {
                  const req = indexedDB.deleteDatabase(dbName);
                  req.onsuccess = () => { console.log('[FCM] Deleted DB:', dbName); resolve(); };
                  req.onerror = () => { console.warn('[FCM] Failed to delete DB:', dbName); resolve(); };
                  req.onblocked = () => { console.warn('[FCM] DB delete blocked:', dbName); resolve(); };
                });
              } catch (dbErr) {
                console.warn('[FCM] Error deleting DB:', dbName, dbErr);
              }
            }
            
            token = await messaging.getToken({ 
              vapidKey: vapidKey,
              serviceWorkerRegistration: reg
            });
          } else {
            throw tokenError;
          }
        }
        window.lastFcmToken = token;
        window.fcmTokenReady = true;
        console.log('[FCM] New token obtained after force-refresh');
      } catch (e) {
        console.error('[FCM] Error force-refreshing token:', e);
        window.fcmTokenError = e.toString();
        window.fcmTokenReady = true;
      }
    };
    window.getServiceWorkerStatus = async function () {
      if (!('serviceWorker' in navigator)) return 'Unsupported';
      try {
        const reg = await navigator.serviceWorker.getRegistration();
        if (!reg) return 'Not Registered';
        if (reg.installing) return 'Installing';
        if (reg.waiting) return 'Waiting';
        if (reg.active) return 'Active';
        return 'Registered';
      } catch (e) {
        return 'Error: ' + e.message;
      }
    };
    window.fetchServiceWorkerStatus = function (callback) {
      if (!('serviceWorker' in navigator)) {
        callback('Unsupported');
        return;
      }
      navigator.serviceWorker.getRegistration()
        .then((reg) => {
          if (!reg) { callback('Not Registered'); return; }
          if (reg.installing) { callback('Installing'); return; }
          if (reg.waiting) { callback('Waiting'); return; }
          if (reg.active) { callback('Active'); return; }
          callback('Registered');
        })
        .catch((e) => {
          callback('Error: ' + e.message);
        });
    };

          window.fcmTokenReady = false;
          window.lastFcmToken = null;
          window._fcmTokenInvalidated = true;
        }

    let wakeLockSentinel = null;
    let shouldKeepScreenOn = false;

    window.requestScreenWakeLock = async function () {
      if (!('wakeLock' in navigator)) {
        console.log('Wake Lock API not supported');
        return false;
      }
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        shouldKeepScreenOn = true;
        console.log('Screen Wake Lock active');

        // Handle auto-release by the system/browser
        wakeLockSentinel.addEventListener('release', () => {
          console.log('Screen Wake Lock released by system/browser');
          wakeLockSentinel = null;
        });

        return true;
      } catch (err) {
        console.error('Wake Lock request failed:', err);
        return false;
      }
    };

    window.releaseScreenWakeLock = async function () {
      shouldKeepScreenOn = false;
      if (wakeLockSentinel !== null) {
        await wakeLockSentinel.release();
        wakeLockSentinel = null;
        console.log('Screen Wake Lock released');
        return true;
      }
      return false;
    };

    window.isScreenWakeLockActive = function () {
      return wakeLockSentinel !== null;

    // Auto re-acquire wake lock when the app returns from background
    document.addEventListener('visibilitychange', async () => {

        console.log('[WakeLock] Page visible again, re-acquiring wake lock...');
        try {
          if (!('wakeLock' in navigator)) return;
          wakeLockSentinel = await navigator.wakeLock.request('screen');
          console.log('[WakeLock] Screen Wake Lock re-acquired successfully');

          wakeLockSentinel.addEventListener('release', () => {

    // Force update helper: clear caches + unregister service workers + hard reload.
    window.forceRefreshAppCache = async function () {
      try {
        // 1. Clear Cache Storage API caches (PWA cached assets)
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));

        // invalidates existing FCM tokens, requiring re-registration. On Android
        // Chrome PWA, token re-registration can fail due to service worker scope
        // conflicts. Preserving the IndexedDB ensures push notifications continue
        // working after a cache refresh.

        // 2. Fetch critical entry point files with 'cache: reload' + nocache query to force-evict HTTP cache
        const criticalUrls = [
          window.location.pathname,
          'flutter_bootstrap.js?v=1780879395901',
          'flutter_service_worker.js',
          'manifest.json',
          'version.json'
        ];

        for (const url of criticalUrls) {
          try {
            await fetch(url + '?nocache=' + Date.now(), {
              cache: 'reload',
              headers: {
                'Pragma': 'no-cache',
                'Cache-Control': 'no-cache'
              }
            });
          } catch (e) {
            console.warn('Failed to force refresh file cache:', url, e);
          }
        }

        // 3. Unregister all service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        // 4. Force a clean location replacement with refresh query param to bypass cache
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('refresh', Date.now().toString());
        window.location.replace(currentUrl.toString());
        return true;
      } catch (err) {
        console.error('forceRefreshAppCache failed:', err);
        window.location.reload();
        return false;
      }
    };
