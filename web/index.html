<!DOCTYPE html>
<html>
<head>

  <!-- Google AdSense Verification Code -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1868503720894962" crossorigin="anonymous"></script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta name="mobile-web-app-capable" content="yes">

  <title>Al-Waqt: Jadwal Sholat & Hilal (NU / Muhammadiyah)</title>
  <link rel="manifest" href="manifest.json">

  <!-- Custom Premium Loading Splash Screen Styling -->
  <style>
    body {
      background-color: #05120C !important;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .moon-spinner {
      position: relative;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #FFE082 0%, #D4AF37 100%);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
      animation: pulse 2s infinite ease-in-out;
    }
    .moon-spinner::after {
      content: '';
      position: absolute;
      top: -1px;
      right: -12px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background-color: #05120C;
      transition: 0.5s;
    }
    .loading-title {
      color: #D4AF37;
      margin-top: 30px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 5px;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
      animation: text-pulse 2s infinite ease-in-out;
    }
    .loading-subtitle {
      color: #81C784;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      opacity: 0.8;
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(0.92);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.7);
      }
    }
    @keyframes text-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1.0; }
    }
  </style>
  <script>
    // JS helpers for PWA offline notifications and wake lock
    window.requestNotificationPermission = async function() {
      if (!('Notification' in window)) {
        console.log('Notification API not supported');
        return 'unsupported';
      }
      return await Notification.requestPermission();
    };

    window.showLocalNotification = function(title, body) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      
      const options = {
        body: body,
        icon: 'icons/Icon-192.png',
        badge: 'icons/Icon-192.png',
        vibrate: [200, 100, 200]
      };

      // 1. Try to find any active Service Worker registration (extremely robust on all devices)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          const activeReg = registrations.find(reg => reg.active);
          if (activeReg) {
            activeReg.showNotification(title, options);
            console.log('[Notification] Triggered via active Service Worker:', activeReg.scope);
          } else {
            // No active registration found, try legacy fallback
            triggerLegacyNotification(title, options);
          }
        }).catch((err) => {
          console.warn('[Notification] SW getRegistrations failed, trying legacy:', err);
          triggerLegacyNotification(title, options);
        });
      } else {
        triggerLegacyNotification(title, options);
      }

      function triggerLegacyNotification(title, options) {
        try {
          new Notification(title, options);
          console.log('[Notification] Triggered via legacy constructor');
        } catch (e) {
          console.warn('[Notification] Legacy constructor blocked (Illegal constructor on Android):', e);
        }
      }
    };

    window.playNotificationSound = function(soundType) {
      try {
        if (soundType === 'adzan') {
          const soundUrl = 'azan.mp3';
          const audio = new Audio(soundUrl);
          audio.volume = 0.7;
          audio.play().catch((err) => {
            console.log('Audio autoplay blocked or failed:', err);
          });
        } else {
          // Premium Web Audio API Synthesized chime - 100% reliable, works offline, zero network requests
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            const audioCtx = new AudioContext();
            
            // First chime tone (high and sweet)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
            gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.2);
            
            // Second chime tone (warm and resonant, slightly delayed)
            setTimeout(() => {
              const osc2 = audioCtx.createOscillator();
              const gain2 = audioCtx.createGain();
              osc2.type = 'sine';
              osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5 note
              gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
              gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
              
              osc2.connect(gain2);
              gain2.connect(audioCtx.destination);
              osc2.start();
              osc2.stop(audioCtx.currentTime + 0.3);
            }, 100);
            
            console.log('[Audio] Played synthetic notification chime');
          } else {
            console.warn('[Audio] Web Audio API not supported');
          }
        }
      } catch (e) {
        console.error('Failed to play audio:', e);
      }
    };

    // Register on a separate scope to prevent conflicts with Flutter PWA service worker while ensuring an active registration exists.
    window.registerFirebaseMessagingSW = async function() {
      if (!('serviceWorker' in navigator)) return false;
      try {
        const registration = await navigator.serviceWorker.register(
          'firebase-messaging-sw.js',
          { scope: '/firebase-cloud-messaging-push-scope' }
        );
        console.log('Firebase messaging service worker registered on custom scope:', registration.scope);
        return true;
      } catch (error) {
        console.error('Failed to register firebase-messaging-sw.js:', error);
        return false;
      }
    };

    let wakeLockSentinel = null;

    window.requestScreenWakeLock = async function() {
      if (!('wakeLock' in navigator)) {
        console.log('Wake Lock API not supported');
        return false;
      }
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        console.log('Screen Wake Lock active');
        return true;
      } catch (err) {
        console.error('Wake Lock request failed:', err);
        return false;
      }
    };

    window.releaseScreenWakeLock = async function() {
      if (wakeLockSentinel !== null) {
        await wakeLockSentinel.release();
        wakeLockSentinel = null;
        console.log('Screen Wake Lock released');
        return true;
      }
      return false;
    };

    window.isScreenWakeLockActive = function() {
      return wakeLockSentinel !== null;
    };

    // Force update helper: clear caches + unregister service workers + hard reload.
    window.forceRefreshAppCache = async function() {
      try {
        // 1. Clear Cache Storage API caches (PWA cached assets)
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        // 2. Clear Firebase Messaging IndexedDB to force-evict old FCM tokens
        if ('indexedDB' in window) {
          try {
            window.indexedDB.deleteDatabase('firebase-messaging-database');
            window.indexedDB.deleteDatabase('fcm_token_details_db');
            console.log('Firebase Messaging IndexedDB cleared.');
          } catch (e) {
            console.warn('Failed to clear FCM IndexedDB:', e);
          }
        }

        // 2. Fetch critical entry point files with 'cache: reload' + nocache query to force-evict HTTP cache
        const criticalUrls = [
          window.location.pathname,
          'flutter_bootstrap.js?v=1780540253054',
          'flutter_service_worker.js',
          'manifest.json',
          'version.json'
        ];

        for (const url of criticalUrls) {
          try {
            await fetch(url + '?nocache=' + Date.now(), {
              cache: 'reload',
              headers: {
                'Pragma': 'no-cache',
                'Cache-Control': 'no-cache'
              }
            });
          } catch (e) {
            console.warn('Failed to force refresh file cache:', url, e);
          }
        }

        // 3. Unregister all service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        // 4. Force a clean location replacement with refresh query param to bypass cache
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('refresh', Date.now().toString());
        window.location.replace(currentUrl.toString());
        return true;
      } catch (err) {
        console.error('forceRefreshAppCache failed:', err);
        window.location.reload();
        return false;
      }
    };

    // Print Monthly Hijri Calendar Helper
    window.printHijriCalendar = function(title, subtitle, locationName, calcMethod, columns, rows) {
      const printWindow = window.open('', '_blank');
      if (!printWindow) {
        alert('Mohon aktifkan pop-up browser untuk mencetak jadwal sholat.');
        return false;
      }

      const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
          <title>${title} - ${subtitle}</title>
          <meta charset="utf-8">
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
            body {
              font-family: 'Plus Jakarta Sans', sans-serif;
              color: #111827;
              margin: 40px;
              padding: 0;
              font-size: 11px;
            }
            .header {
              text-align: center;
              margin-bottom: 25px;
              border-bottom: 2.5px solid #0F5A3E;
              padding-bottom: 15px;
            }
            .header h1 {
              color: #0F5A3E;
              font-size: 22px;
              margin: 0 0 5px 0;
              font-weight: 700;
              letter-spacing: 1px;
            }
            .header h2 {
              color: #B45309;
              font-size: 14px;
              margin: 0 0 10px 0;
              font-weight: 600;
              letter-spacing: 0.5px;
            }
            .meta-grid {
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 15px;
              font-size: 11px;
              color: #4B5563;
              margin-bottom: 20px;
              padding: 0 10px;
            }
            .meta-item strong {
              color: #1F2937;
            }
            table {
              width: 100%;
              border-collapse: collapse;
              margin-top: 15px;
              page-break-inside: auto;
            }
            tr {
              page-break-inside: avoid;
              page-break-after: auto;
            }
            th {
              background-color: #0F5A3E;
              color: white;
              font-weight: 600;
              text-transform: uppercase;
              font-size: 10px;
              letter-spacing: 0.5px;
              padding: 9px 6px;
              border: 1px solid #0F5A3E;
            }
            td {
              padding: 8px 6px;
              border: 1px solid #E5E7EB;
              text-align: center;
            }
            tr:nth-child(even) td {
              background-color: #F9FAFB;
            }
            .weekend td {
              background-color: #FFFBEB !important; /* Premium light gold/yellow for weekends */
              font-weight: 500;
            }
            .special-day td {
              background-color: #ECFDF5 !important; /* Premium light emerald for Islamic events */
              font-weight: 600;
              color: #065F46;
            }
            .holiday-name {
              font-size: 9px;
              font-weight: 700;
              color: #D97706;
            }
            .footer {
              margin-top: 40px;
              text-align: center;
              font-size: 9px;
              color: #9CA3AF;
              border-top: 1px solid #E5E7EB;
              padding-top: 15px;
              line-height: 1.5;
            }
            @media print {
              body {
                margin: 20px;
              }
              .no-print {
                display: none;
              }
              th {
                background-color: #0F5A3E !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
              }
              .weekend td {
                background-color: #FFFBEB !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
              }
              .special-day td {
                background-color: #ECFDF5 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
              }
            }
          </style>
        </head>
        <body>
          <div class="header">
            <h1>${title}</h1>
            <h2>${subtitle}</h2>
          </div>
          
          <div class="meta-grid">
            <div class="meta-item">
              <strong>Lokasi:</strong> ${locationName}<br>
              <strong>Metode Perhitungan:</strong> ${calcMethod}
            </div>
            <div class="meta-item" style="text-align: right;">
              <strong>Tanggal Cetak:</strong> ${new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}<br>
              <strong>Sistem Aplikasi:</strong> Al-Waqt (Kemenag & Muhammadiyah)
            </div>
          </div>

          <table>
            <thead>
              <tr>
                ${columns.map(col => `<th>${col}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => {
                let rowClass = '';
                if (row.isSpecial) rowClass = 'special-day';
                else if (row.isWeekend) rowClass = 'weekend';

                return `
                  <tr class="${rowClass}">
                    <td><strong>${row.dayName}</strong></td>
                    <td>${row.hijriDate}</td>
                    <td>${row.gregorianDate}</td>
                    <td style="color: #4B5563;">${row.imsak}</td>
                    <td style="font-weight: 600;">${row.subuh}</td>
                    <td style="color: #6B7280;">${row.syuruq}</td>
                    <td>${row.dzuhur}</td>
                    <td>${row.ashar}</td>
                    <td style="font-weight: 600; color: #0F5A3E;">${row.maghrib}</td>
                    <td>${row.isya}</td>
                    <td><span class="holiday-name">${row.keterangan || ''}</span></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>

          <div class="footer">
            Jadwal sholat bulanan ini dihitung secara presisi berdasarkan posisi astronomis geografis bumi oleh Al-Waqt.<br>
            Akurasi komparatif diverifikasi terhadap perhitungan orisinal Kemenag RI dan KHGT Muhammadiyah.<br>
            © ${new Date().getFullYear()} Al-Waqt. Seluruh Hak Cipta Dilindungi.
          </div>

        </body>
        </html>
      `;

      printWindow.document.open();
      printWindow.document.write(htmlContent);
      printWindow.document.close();

      setTimeout(function() {
        printWindow.print();
      }, 500);
      return true;
    };

    // Register the Firebase messaging service worker on a separate scope on load to ensure robust local debug notifications.
    window.registerFirebaseMessagingSW();
  </script>
</head>
<body>
  <!-- Loading Splash Screen UI -->
  <div class="loading-container" id="loading-indicator">
    <div class="moon-spinner"></div>
    <div class="loading-title">AL-WAQT</div>
    <div class="loading-subtitle">Sholat & Hilal Sighting</div>
  </div>


  <script src="flutter_bootstrap.js?v=1780540253054" async></script>
</body>
